<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relay Rate Checker</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark">S2</div>
          <div>
            <h1>中转站比价控制台</h1>
            <p id="storagePath" class="muted"></p>
          </div>
        </div>
        <div class="top-actions">
          <button id="newSiteBtn" type="button">新建站点</button>
          <button id="browserLoginBtn" type="button">浏览器登录</button>
          <button id="captureTokenBtn" type="button">采集 Token</button>
          <button id="querySelectedBtn" type="button">查询当前</button>
          <button id="queryAllBtn" type="button" class="primary">查询全部</button>
        </div>
      </header>

      <main class="console-grid">
        <aside class="site-column">
          <section class="panel site-panel">
            <div class="panel-title">
              <span>站点</span>
              <span class="panel-count" id="siteCount">0</span>
            </div>
            <div id="siteList" class="site-list"></div>
          </section>

          <section class="panel editor">
            <div class="panel-title">站点配置</div>
            <form id="siteForm">
              <input id="siteId" type="hidden">

              <label>
                <span>名称</span>
                <input id="name" autocomplete="off">
              </label>

              <label>
                <span>Base URL</span>
                <input id="baseUrl" autocomplete="off" placeholder="https://example.com">
              </label>

              <div class="grid-two">
                <label>
                  <span>站点类型</span>
                  <select id="provider">
                    <option value="sub2api">sub2api</option>
                    <option value="newapi">New API</option>
                  </select>
                </label>
                <label>
                  <span>New API User ID</span>
                  <input id="newApiUserId" autocomplete="off" placeholder="可选">
                </label>
              </div>

              <div class="grid-two">
                <label>
                  <span>邮箱 / 用户名</span>
                  <input id="email" type="email" autocomplete="username">
                </label>
                <label>
                  <span>密码</span>
                  <input id="password" type="password" autocomplete="current-password">
                </label>
              </div>

              <label>
                <span>Turnstile Token</span>
                <input id="turnstileToken" autocomplete="off">
              </label>

              <label>
                <span>Auth Token</span>
                <textarea id="authToken" rows="3" spellcheck="false"></textarea>
              </label>

              <label>
                <span>Refresh Token</span>
                <textarea id="refreshToken" rows="2" spellcheck="false"></textarea>
              </label>

              <label>
                <span>备注</span>
                <input id="notes" autocomplete="off">
              </label>

              <div class="form-actions">
                <button id="saveSiteBtn" type="submit" class="primary">保存</button>
                <button id="deleteSiteBtn" type="button" class="danger">删除</button>
              </div>
            </form>
          </section>
        </aside>

        <div class="resize-handle" id="resizeHandle" title="拖动调整宽度"></div>

        <section class="content-column">
          <div id="statusBar" class="status-bar" role="status" aria-live="polite">就绪</div>

          <section class="panel comparison-panel">
            <div class="panel-title">
              <span>全站比价</span>
              <span class="panel-count" id="comparisonCount">0</span>
            </div>
            <div class="comparison-head">
              <div id="bestOffer" class="best-offer"></div>
              <div class="group-picker">
                <div class="picker-label">
                  <span id="groupFilterLabel">分组筛选</span>
                  <span id="groupCount">0</span>
                </div>
                <button id="groupDropdownBtn" class="group-select-button" type="button" aria-haspopup="listbox" aria-expanded="false">
                  <span>
                    <strong id="groupDropdownValue">全部分组</strong>
                    <small id="groupDropdownMeta">按倍率排序</small>
                  </span>
                  <span class="chevron" aria-hidden="true"></span>
                </button>
                <div id="groupDropdownMenu" class="group-menu" hidden>
                  <label class="search-field">
                    <span>搜索</span>
                    <input id="groupSearch" autocomplete="off" placeholder="搜索分组...">
                  </label>
                  <div id="groupList" class="group-list" role="listbox"></div>
                </div>
              </div>
            </div>
            <div id="comparisonRows" class="comparison-rows"></div>
            <div id="comparisonOffers" class="comparison-offers"></div>
          </section>

          <div class="inner-resize-handle" id="innerResizeHandle" title="拖动调整列宽"></div>

          <section class="detail-head">
            <div class="detail-main">
              <div class="eyebrow">当前站点</div>
              <h2 id="selectedSiteTitle">请选择站点</h2>
              <p id="selectedSiteMeta">保存或选择一个站点后展示详情。</p>
            </div>
            <div class="detail-source">
              <span>分组来源</span>
              <strong id="groupSourceText">未查询</strong>
            </div>
          </section>

          <section class="summary-strip">
            <div>
              <span class="summary-label">已查</span>
              <strong id="summarySites">0</strong>
            </div>
            <div>
              <span class="summary-label">成功</span>
              <strong id="summarySuccess">0</strong>
            </div>
            <div>
              <span class="summary-label">失败</span>
              <strong id="summaryFailed">0</strong>
            </div>
            <div>
              <span class="summary-label">Key</span>
              <strong id="summaryKeys">0</strong>
            </div>
            <div>
              <span class="summary-label">监控</span>
              <strong id="summaryMonitors">0</strong>
            </div>
          </section>

          <section class="panel data-panel results-panel">
            <div class="panel-title">
              <span>API Keys 汇总</span>
              <span class="table-hint">按当前站点和分组过滤</span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Key</th>
                    <th>状态</th>
                    <th>分组</th>
                    <th>平台</th>
                    <th>默认倍率</th>
                    <th>专属倍率</th>
                    <th>最终倍率</th>
                    <th>配额</th>
                    <th>最近使用</th>
                  </tr>
                </thead>
                <tbody id="resultRows"></tbody>
              </table>
            </div>
          </section>

          <section class="panel data-panel monitor-panel">
            <div class="panel-title">
              <span>渠道监控汇总</span>
              <span class="table-hint">模型、延迟、可用率</span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>监控</th>
                    <th>分组</th>
                    <th>供应商</th>
                    <th>主模型</th>
                    <th>状态</th>
                    <th>延迟</th>
                    <th>7日可用</th>
                    <th>模型数</th>
                    <th>模型详情</th>
                  </tr>
                </thead>
                <tbody id="monitorRows"></tbody>
              </table>
            </div>
          </section>

          <section class="panel failures-panel">
            <div class="panel-title">失败</div>
            <div id="failures"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
